name: Bug report
description: Report a reproducible bug in structured output handling
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: Describe the bug clearly and include expected behavior.
    validations:
      required: true
  - type: input
    id: spring_boot
    attributes:
      label: Spring Boot version
      placeholder: 4.0.1
  - type: input
    id: spring_ai
    attributes:
      label: Spring AI version
      placeholder: 2.0.0-M1
  - type: input
    id: java_version
    attributes:
      label: Java version
      placeholder: 21
  - type: textarea
    id: raw_response
    attributes:
      label: Raw model response
      description: Paste the raw output if you can safely share it.
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Share the smallest code sample that reproduces the issue.
    validations:
      required: true

