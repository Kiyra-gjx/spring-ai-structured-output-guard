name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: preview
            spring-boot-version: 4.0.1
            spring-ai-version: 2.0.0-M5
          - name: stable
            spring-boot-version: 3.5.11
            spring-ai-version: 1.1.4
    name: >
      compatibility (${{ matrix.name }}) -
      Boot ${{ matrix.spring-boot-version }} /
      AI ${{ matrix.spring-ai-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Print resolved compatibility versions
        run: >
          ./gradlew printCompatibilityVersions
          -PspringBootVersion=${{ matrix.spring-boot-version }}
          -PspringAiVersion=${{ matrix.spring-ai-version }}

      - name: Run tests
        run: >
          ./gradlew test
          -PspringBootVersion=${{ matrix.spring-boot-version }}
          -PspringAiVersion=${{ matrix.spring-ai-version }}
