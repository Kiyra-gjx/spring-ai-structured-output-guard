name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to publish
        required: true
        default: 0.1.0
      run_tests:
        description: Run the Gradle test suite before publishing
        required: true
        type: boolean
        default: true
      central_publishing_type:
        description: Central publishing type
        required: true
        default: user_managed

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      MAVEN_SIGNING_KEY: ${{ secrets.MAVEN_SIGNING_KEY }}
      MAVEN_SIGNING_PASSWORD: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
      CENTRAL_PUBLISHING_TYPE: ${{ inputs.central_publishing_type }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: ./gradlew test

      - name: Publish release to Maven Central
        run: ./gradlew publishReleaseToCentralPortal -PreleaseVersion=${{ inputs.release_version }}
